scheme: "rose-lain-mid"
author: "yuls (derived from lain_wp_1.jpg)"

# base00-03: backgrounds — black → deep rose-wine
# Selection (base02) bumped just enough to be visible; comments (base03) lightened
# so they actually read on black instead of disappearing.
base00: "000000"   # pure black, main bg                                ----
base01: "1a0c14"   # very dark rose-black, softer bg                    ---
base02: "36192a"   # dark rose, selection / inactive bg                 --
base03: "965270"   # readable wine, comments (~3.7:1 on black)          -

# base04-07: foregrounds — rose ramp preserved, just spread more
base04: "b87080"   # dusty rose, dim fg — clearly above base03 (~3.5:1) +
base05: "d488a0"   # mid rose, default fg                               ++
base06: "edbac3"   # light rose, light fg                               +++
base07: "faeaec"   # near-white rose, brightest fg                      ++++

# base08-0F: semantic colors — all anchored to the wallpaper's rose/pink/purple/cream/peach
# Differentiated by lightness + small hue rotations within the warm arc.
base08: "e82050"   # hot crimson-rose   (red)
base09: "f08a5c"   # warm orange-coral  (orange)
base0A: "f0d090"   # warm gold-cream    (yellow)
base0B: "b05c82"   # deep rose          (green — ~4.7:1 on black)
base0C: "f49ab0"   # bright rose-pink   (aqua/cyan)
base0D: "a060d8"   # lavender-violet    (blue — accent contrast)
base0E: "e070c0"   # pink-magenta       (purple)
base0F: "9a6878"   # muted dusty rose   (brown — ~4.6:1 on black)
